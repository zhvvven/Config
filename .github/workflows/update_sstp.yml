name: Fetch and Check SSTP Proxies

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间早上 8:00) 自动运行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create and Run Script
        run: |
          # 将 Python 脚本直接写入当前运行环境
          cat << 'EOF' > check_proxies.py
          import requests
          import re
          import os
          import urllib.parse
          from concurrent.futures import ThreadPoolExecutor, as_completed

          SOURCE_URL = "https://sub.cmliussss.net/vpngate"
          CHECK_API_BASE = "https://check.socks5.cmliussss.net/check?proxy="

          def check_proxy(link):
              check_url = CHECK_API_BASE + urllib.parse.quote(link)
              try:
                  response = requests.get(check_url, timeout=15)
                  data = response.json()
                  
                  if data.get("success") is True:
                      exit_data = data.get("exit", {})
                      company_score = exit_data.get("company", {}).get("abuser_score", "")
                      asn_score = exit_data.get("asn", {}).get("abuser_score", "")
                      
                      if "Very Low" in company_score or "Very Low" in asn_score:
                          country = exit_data.get("location", {}).get("country", "Unknown")
                          return f"cdn.31514926.xyz:443#{country}家宽${link}"
              except Exception:
                  pass
              return None

          def main():
              print("开始获取 SSTP 链接...")
              try:
                  response = requests.get(SOURCE_URL, timeout=10)
                  links = re.findall(r'sstp://[^\s<>"\'\n]+', response.text)
                  links = list(set(links))
                  print(f"成功获取并去重得到 {len(links)} 个 SSTP 链接。")
              except Exception as e:
                  print(f"获取源链接失败: {e}")
                  return

              print("开始并发检测节点连通性和 IP 质量...")
              valid_nodes = []
              
              with ThreadPoolExecutor(max_workers=20) as executor:
                  future_to_link = {executor.submit(check_proxy, link): link for link in links}
                  for future in as_completed(future_to_link):
                      result = future.result()
                      if result:
                          valid_nodes.append(result)
                          print(f"成功匹配节点: {result}")

              print(f"\n检测完成，共找到 {len(valid_nodes)} 个符合条件的节点。")

              os.makedirs("bestcf", exist_ok=True)
              file_path = "bestcf/sstp.txt"
              with open(file_path, "w", encoding="utf-8") as f:
                  for node in valid_nodes:
                      f.write(node + "\n")
              print(f"结果已保存至 {file_path}")

          if __name__ == "__main__":
              main()
          EOF
          
          # 执行上面刚刚写出的 Python 脚本
          python check_proxies.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add bestcf/sstp.txt
          # 如果文件发生了变动，则提交推送；如果没有变动，则跳过
          git diff --staged --quiet || (git commit -m "Auto-update valid SSTP proxies" && git push)
