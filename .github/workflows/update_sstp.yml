name: Update SSTP

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-sstp:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create and Run Script
        run: |
          cat << 'EOF' > check_proxies.py
          import requests
          import re
          import os
          import urllib.parse
          from collections import defaultdict
          from concurrent.futures import ThreadPoolExecutor, as_completed

          SOURCE_URL = "https://sub.cmliussss.net/vpngate"
          CHECK_API_BASE = "https://check.socks5.cmliussss.net/check?proxy="

          def check_proxy(link):
              check_url = CHECK_API_BASE + urllib.parse.quote(link)
              try:
                  response = requests.get(check_url, timeout=15)
                  data = response.json()
                  
                  if data.get("success") is True:
                      exit_data = data.get("exit", {})
                      company_score = exit_data.get("company", {}).get("abuser_score", "")
                      asn_score = exit_data.get("asn", {}).get("abuser_score", "")
                      
                      if "Very Low" in company_score and "Very Low" in asn_score:
                          country = exit_data.get("location", {}).get("country", "Unknown")
                          response_time = data.get("responseTime", 999999) 
                          formatted_link = f"cdn.31514926.xyz:443#{country}家宽${link}"
                          
                          return {
                              "country": country,
                              "responseTime": response_time,
                              "formatted_link": formatted_link
                          }
              except Exception:
                  pass
              return None

          def main():
              print("开始获取 SSTP 链接...")
              try:
                  response = requests.get(SOURCE_URL, timeout=10)
                  links = re.findall(r'sstp://[^\s<>"\'\n]+', response.text)
                  links = list(set(links))
                  print(f"成功获取并去重得到 {len(links)} 个 SSTP 链接。")
              except Exception as e:
                  print(f"获取源链接失败: {e}")
                  return

              print("开始并发检测节点连通性和 IP 质量...")
              
              grouped_nodes = defaultdict(list)
              
              with ThreadPoolExecutor(max_workers=20) as executor:
                  future_to_link = {executor.submit(check_proxy, link): link for link in links}
                  for future in as_completed(future_to_link):
                      result = future.result()
                      if result:
                          grouped_nodes[result["country"]].append(result)
                          print(f"成功匹配节点: {result['formatted_link']} (延迟: {result['responseTime']}ms)")

              final_nodes = []
              for country, nodes in grouped_nodes.items():
                  nodes.sort(key=lambda x: x["responseTime"])
                  top_nodes = nodes[:3]
                  for node in top_nodes:
                      final_nodes.append(node["formatted_link"])

              print(f"\n检测与筛选完成，共保留 {len(final_nodes)} 个最优节点。")

              os.makedirs("bestcf", exist_ok=True)
              file_path = "bestcf/sstp.txt"
              with open(file_path, "w", encoding="utf-8") as f:
                  for node in final_nodes:
                      f.write(node + "\n")
              print(f"结果已保存至 {file_path}")

          if __name__ == "__main__":
              main()
          EOF
          
          python check_proxies.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add bestcf/sstp.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto update SSTP: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit."
          fi
