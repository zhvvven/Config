name: Update Cloudflare Proxy IP

on:
  schedule:
    - cron: '0 16,22,4,10 * * *'
  workflow_dispatch:

jobs:
  update-cf-proxyip:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Fetch CSV and Generate TXT
        run: |
          mkdir -p bestcf
          python - <<EOF
          import csv
          import requests
          import re
          import os
          import io
          from concurrent.futures import ThreadPoolExecutor, as_completed

          url = "https://github.com/xgonce/Cloudflare_IP/raw/main/result.csv"
          output_file = "bestcf/cf-proxy-ip.txt"
          
          ALLOWED_COUNTRIES = ["HK", "SG", "JP", "US"]

          def check_node(ip, port):
              try:
                  resp = requests.get(
                      "https://api.090227.xyz/check", 
                      params={"proxyip": f"{ip}:{port}"}, 
                      timeout=10.0
                  )
                  if resp.status_code == 200:
                      data = resp.json()
                      if data.get("success") is True and data.get("inferred_stack") == "ipv4_only":
                          try:
                              country = data["probe_results"]["ipv4"]["exit"]["country"]
                          except KeyError:
                              country = None
                          
                          if country in ALLOWED_COUNTRIES:
                              resp_time = data.get("responseTime", 9999)
                              return {"ip": ip, "port": port, "country": country, "time": resp_time}
              except Exception:
                  pass
              return None

          try:
              print("1. 正在获取并解析 CSV 文件...")
              response = requests.get(url, timeout=10.0)
              response.raise_for_status()
              
              f_in = io.StringIO(response.text.strip())
              reader = csv.reader(f_in)
              next(reader, None)

              ipv4_pattern = re.compile(r'^(\d{1,3}\.){3}\d{1,3}$')
              raw_nodes = []
              
              for row in reader:
                  if len(row) >= 3:
                      ip = row[1].strip()
                      port = row[2].strip()
                      if ipv4_pattern.match(ip):
                          raw_nodes.append((ip, port))
              
              print(f"-> 成功提取了 {len(raw_nodes)} 个待测节点。")

              print(f"\n2. 正在进行 API 筛选及地区({','.join(ALLOWED_COUNTRIES)})过滤 (并发: 50)...")
              valid_nodes = []
              with ThreadPoolExecutor(max_workers=50) as executor:
                  futures = [executor.submit(check_node, ip, port) for ip, port in raw_nodes]
                  for future in as_completed(futures):
                      res = future.result()
                      if res:
                          valid_nodes.append(res)
              
              print(f"-> 筛选完成，共有 {len(valid_nodes)} 个节点符合协议与地区条件。")

              print("\n3. 正在按地区分类、按照 responseTime 排序并截取前 20 个...")
              grouped_nodes = {c: [] for c in ALLOWED_COUNTRIES}
              for node in valid_nodes:
                  grouped_nodes[node["country"]].append(node)

              final_results = []
              for country in ALLOWED_COUNTRIES:
                  nodes_in_country = grouped_nodes[country]
                  nodes_in_country.sort(key=lambda x: x["time"])
                  top_nodes = nodes_in_country[:20]
                  
                  for node in top_nodes:
                      final_results.append(f"{node['ip']}:{node['port']}#{node['country']}")
                      
                  print(f"-> {country} 地区保留了 {len(top_nodes)} 个最优节点。")

              with open(output_file, "w", encoding="utf-8") as f:
                  f.write("\n".join(final_results))
                  
              print(f"\nDone! 最终合并保存了 {len(final_results)} 个 Proxyip 节点到 {output_file}。")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add bestcf/cf-proxy-ip.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto update Proxyip: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit."
          fi
