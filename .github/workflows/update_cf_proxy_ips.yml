name: Update Cloudflare Proxy IPs

on:
  schedule:
    - cron: '0 16,22,4,10 * * *'
  workflow_dispatch:

jobs:
  update-cf-ips:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Fetch CSV and Generate TXT
        run: |
          mkdir -p bestcf
          python - <<EOF
          import csv
          import requests
          import re
          import os
          import io
          import socket
          from concurrent.futures import ThreadPoolExecutor, as_completed

          url = "https://github.com/xgonce/Cloudflare_IP/raw/refs/heads/main/result.csv"
          output_file = "bestcf/cf-proxy-ip.txt"
          
          def test_tcp(ip, port):
              try:
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                      sock.settimeout(2.0)
                      sock.connect((ip, int(port)))
                  return True
              except:
                  return False

          def test_availability(ip, port):
              try:
                  resp = requests.get(
                      "https://api.090227.xyz/check", 
                      params={"proxyip": f"{ip}:{port}"}, 
                      timeout=5.0
                  )
                  if resp.status_code == 200 and resp.json().get("success") is True:
                      return True
              except:
                  pass
              return False

          try:
              response = requests.get(url)
              response.raise_for_status()
              
              f_in = io.StringIO(response.text.strip())
              reader = csv.reader(f_in)
              next(reader, None)

              ipv4_pattern = re.compile(r'^(\d{1,3}\.){3}\d{1,3}$')
              raw_nodes = []
              
              for row in reader:
                  if len(row) >= 3:
                      ip = row[1].strip()
                      port = row[2].strip()
                      if ipv4_pattern.match(ip):
                          raw_nodes.append((ip, port))
              
              print(f"1. 成功提取了 {len(raw_nodes)} 个 Proxyip 节点。")

              print("2. 正在进行 TCP 连通性筛选 (并发: 50)...")
              tcp_passed = []
              with ThreadPoolExecutor(max_workers=50) as executor:
                  futures = {executor.submit(test_tcp, ip, port): (ip, port) for ip, port in raw_nodes}
                  for future in as_completed(futures):
                      if future.result():
                          tcp_passed.append(futures[future])
              
              print(f"TCP 筛选通过: {len(tcp_passed)} 个 Proxyip 节点。")

              print("3. 正在进行 API 可用性二次筛选 (并发: 30)...")
              api_passed = []
              with ThreadPoolExecutor(max_workers=30) as executor:
                  futures = {executor.submit(test_availability, ip, port): (ip, port) for ip, port in tcp_passed}
                  for future in as_completed(futures):
                      if future.result():
                          api_passed.append(futures[future])
              
              print(f"API 筛选通过: {len(api_passed)} 个 Proxyip 节点。")

              final_nodes = api_passed if api_passed else tcp_passed

              results = [f"{ip}:{port}" for ip, port in final_nodes]

              with open(output_file, "w") as f:
                  f.write("\n".join(results))
                  
              print(f"Done! 最终保存了 {len(results)} 个 Proxyip 节点。")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add bestcf/cf-proxy-ip.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto update Proxyip: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit."
          fi
